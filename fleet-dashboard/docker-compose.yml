services:
  fleet-dashboard:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-telemetry-dashboard
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5001
      APP_ENV: production
      DB_NAME: /app/data/telemetry.db
    volumes:
      - fleet_data:/app/data
      - fleet_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  fleet_data:
  fleet_logs:
